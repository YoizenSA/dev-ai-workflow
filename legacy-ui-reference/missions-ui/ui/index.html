<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1 class="header-title">
          <span class="logo-y">y</span><span class="logo-wai">wai</span>
          <span class="logo-sub">Mission Control</span>
        </h1>
      </div>
      <ul class="nav-links">
        <li data-view="projects" class="active">
          <a href="#" data-nav="projects">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span>Projects</span>
          </a>
        </li>
        <li data-view="missions">
          <a href="#" data-nav="missions">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="12,8 16,12 12,16"/><line x1="8" y1="12" x2="14" y2="12"/></svg>
            <span>Missions</span>
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="ws-status" class="ws-status ws-disconnected" title="Disconnected">
          <span class="ws-dot"></span>
          <span class="ws-label">Disconnected</span>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="content">
      <div id="view-projects" class="view active"><div id="projects-list"></div></div>
      <div id="view-project-detail" class="view"></div>
      <div id="view-new-mission" class="view"></div>
      <div id="view-plan-review" class="view"></div>
      <div id="view-mission-detail" class="view"></div>
      <div id="view-missions" class="view"><div id="missions-dashboard-content"></div></div>
    </main>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="hideModal(event)">
    <div id="modal-content" class="modal-content" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/static/app.js"></script>
</body>
</html>
