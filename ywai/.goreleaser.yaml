version: 2

before:
  hooks:
    - bash scripts/prepare-embedded.sh

builds:
  - main: ./cmd/ywai
    binary: ywai
    tags:
      - embedded
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    ignore: []

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      ywai_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  overwrite: true
  github:
    owner: YoizenSA
    name: dev-ai-workflow
  draft: false
  prerelease: auto
  mode: replace
  extra_files:
    - glob: scripts/install.sh
    - glob: scripts/install.ps1
  header: |
    ## ywai {{ .Tag }}
    
    One command to install gentle-ai + extra skills + project config.
  footer: |
    **Install:**
    ```powershell
    # Windows (PowerShell)
    irm https://github.com/YoizenSA/dev-ai-workflow/releases/latest/download/install.ps1 | iex
    ```
    ```bash
    # macOS / Linux
    curl -fsSL https://github.com/YoizenSA/dev-ai-workflow/releases/latest/download/install.sh | bash
    ```
    ```bash
    # Go from a source checkout
    cd ywai
    bash scripts/prepare-embedded.sh
    go install -tags embedded ./cmd/ywai
    ```

