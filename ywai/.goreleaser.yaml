version: 2

name: ywai

before:
  hooks:
    - bash scripts/prepare-embedded.sh

builds:
  - main: ./cmd/ywai
    binary: ywai
    tags:
      - embedded
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      ywai_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Yoizen
    name: dev-ai-workflow
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## ywai {{ .Tag }}
    
    One command to install gentle-ai + extra skills + project config.
  footer: |
    **Install:**
    ```bash
    # Go (any OS)
    go install github.com/Yoizen/dev-ai-workflow/ywai/cmd/ywai@latest
    ```
    
    **Or download a binary from the assets below.**

