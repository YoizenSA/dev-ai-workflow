# Azure Pipeline — Build & Push Docker images + Helm chart
# Triggered on version/* tags. Version is extracted from the tag name.
# Example: tag version/9.1.0 -> version 9.1.0

trigger:
  tags:
    include:
      - version/*
  branches:
    exclude:
      - '*'

variables:
  - name: imageVersion
    value: $[ replace(variables['Build.SourceBranch'], 'refs/tags/version/', '') ]
  - name: productName
    value: 'your-product-name'
  - name: acrServiceConnection
    value: 'your-acr-service-connection'
  - name: acrHost
    value: 'yourregistry.azurecr.io'

stages:
  - stage: BuildAndPush
    displayName: 'Build & Push Docker Images'
    jobs:
      - job: BuildImages
        displayName: 'Build & Push All Services'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          matrix:
            api1:
              serviceName: api1
              dockerfilePath: 'src/api1/Dockerfile'
            api2:
              serviceName: api2
              dockerfilePath: 'src/api2/Dockerfile'
            api3:
              serviceName: api3
              dockerfilePath: 'src/api3/Dockerfile'
        steps:
          - task: Docker@2
            displayName: 'Build & Push $(serviceName)'
            inputs:
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(productName)/$(serviceName)'
              command: buildAndPush
              Dockerfile: '$(dockerfilePath)'
              tags: |
                $(imageVersion)
                latest

  - stage: PackageHelm
    displayName: 'Package & Push Helm Chart'
    dependsOn: BuildAndPush
    jobs:
      - job: HelmPublish
        displayName: 'Package and Push Umbrella Helm Chart'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: 'latest'

          - script: |
              sed -i "s/{{chartversion}}/$(imageVersion)/g" DevOps/Helm/values.yaml
              sed -i "s/{{chartversion}}/$(imageVersion)/g" DevOps/Helm/Chart.yaml
            displayName: 'Inject chart version'

          - script: |
              helm dependency update DevOps/Helm
            displayName: 'Update Helm dependencies'

          - script: |
              helm package DevOps/Helm \
                --version $(imageVersion) \
                --app-version $(imageVersion) \
                --destination $(Build.ArtifactStagingDirectory)
            displayName: 'Package Helm chart'

          - script: |
              helm registry login $(acrHost) \
                --username $(acrUsername) \
                --password $(acrPassword)
              helm push \
                $(Build.ArtifactStagingDirectory)/$(productName)-$(imageVersion).tgz \
                oci://$(acrHost)/helm
            displayName: 'Push Helm chart to ACR'
            env:
              acrUsername: $(ACR_USERNAME)
              acrPassword: $(ACR_PASSWORD)
