# SPA config for nginx-unprivileged. ADAPT the Content-Security-Policy connect-src
# to the real API/auth origins, and add third-party origins (e.g. Google Sign-In) as needed.
server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 1m;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Do NOT add X-XSS-Protection (deprecated) — CSP replaces it.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

  # GOTCHA: add_header inside a location REPLACES all inherited headers — repeat them there.
  # Hashed build assets (Angular/Vite output): cache forever.
  location ~* \.(?:js|css|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
  }

  # Runtime-config pattern (only if the entrypoint generates /tmp/env.js):
  # location = /env.js {
  #   alias /tmp/env.js;
  #   expires -1;
  #   add_header Cache-Control "no-store" always;
  #   # ...repeat the security headers here too
  # }

  location = /health_check {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
