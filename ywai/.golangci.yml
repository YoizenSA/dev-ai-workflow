# golangci-lint v2 configuration
# Docs: https://golangci-lint.run/docs/linters/configuration/
#
# errcheck is disabled: the codebase has ~300 unchecked-error sites (mostly in
# tests and idiomatic best-effort cleanup: deferred Close, fmt.Fprint* to
# io.Writer, http.ResponseWriter.Write, json encode/decode, os.Remove in
# rollback). These are intentional and silencing them one-by-one adds noise
# without changing behavior. All other default linters (govet, staticcheck,
# ineffassign, unused, etc.) remain enabled.
version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused

formatters:
  enable:
    - gofmt
