<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ywai - Unified Dashboard</title>
    <link rel="stylesheet" href="/ui/theme/index.css">
    <style>
        :root {
            --sidebar-w: 264px;
            --sidebar-collapsed: 78px;
        }

        body {
            margin: 0;
            padding: 0;
            color-scheme: dark;
        }

        .app-shell {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            background: var(--surface-soft);
            border-right: 1px solid var(--panel-border);
            padding: var(--space-4);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2);
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 600;
            background: var(--grad-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(106, 106, 255, 0.3));
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            color: var(--text-soft);
            text-decoration: none;
            transition: all 120ms ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--surface-strong);
            color: var(--text);
            border: 1px solid var(--panel-border-strong);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--yz-primary-1);
            border-radius: 0 2px 2px 0;
        }

        .content {
            padding: var(--space-8);
            overflow-y: auto;
        }

        /* Kanban Board Styles */
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-4);
            min-height: 60vh;
        }

        .column {
            background: var(--surface-soft);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
        }

        .column-header h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .column-count {
            background: var(--surface-strong);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .column-cards {
            flex: 1;
            min-height: 200px;
        }

        /* Grid Layout */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-6);
        }

        .card {
            background: var(--surface-soft);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
        }

        .card-header {
            margin-bottom: var(--space-4);
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-body {
            color: var(--text-soft);
        }

        @media (max-width: 920px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                width: var(--sidebar-w);
                z-index: 1000;
                transition: left 200ms ease;
            }

            .sidebar.open {
                left: 0;
            }

            .content {
                padding: var(--space-4);
            }

            .board {
                grid-template-columns: 1fr;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .mobile-toggle {
                display: block;
                position: fixed;
                bottom: var(--space-4);
                right: var(--space-4);
                z-index: 1001;
            }
        }

        .mobile-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="/ui/logo.svg" alt="ywai" class="h-8 w-auto">
                <span class="brand-name">ywai</span>
            </div>

            <nav class="nav">
                <a class="nav-item active" data-view="kanban">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                        <line x1="15" y1="9" x2="15" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                    </svg>
                    Kanban
                </a>
                <a class="nav-item" data-view="missions">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5v11"/>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 15a6 6 0 0 1 6 6"/>
                    </svg>
                    Missions
                </a>
            </nav>
        </aside>

        <main class="content" id="main-content">
            <!-- Content rendered by app.js -->
        </main>

        <button class="mobile-toggle btn btn-primary" onclick="toggleSidebar()">
            ☰
        </button>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
    <script src="/ui/app.js"></script>
</body>
</html>
