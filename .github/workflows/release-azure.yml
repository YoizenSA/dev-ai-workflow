# =============================================================================
# release-azure.yml — Release pipeline (COMENTADO, no se ejecuta)
# =============================================================================
#
# PROPÓSITO:
#   Cuando el repo se haga privado, este pipeline reemplaza a .github/workflows/release.yml.
#   Genera los binaries con GoReleaser y los sube a:
#     1. GitHub Releases (público o privado, usa GITHUB_TOKEN)
#     2. Azure Blob Storage (acceso privado para distribución interna)
#
# PRERREQUISITOS (se crean UNA vez):
#
#   1. Storage Account + Container en Azure Portal o CLI:
#      az storage account create --name stywaireleases --resource-group rg-ywai --location eastus --sku Standard_LRS
#      az storage container create --name releases --account-name stywaireleases
#
#   2. Generar SAS token con permisos de escritura:
#      az storage container generate-sas \
#        --account-name stywaireleases \
#        --name releases \
#        --permissions acw \
#        --expiry $(date -d "+1 year" +%Y-%m-%d) \
#        -o tsv
#
#   3. Configurar secrets en GitHub (Settings → Secrets → Actions):
#      AZURE_STORAGE_ACCOUNT   → nombre de la storage account (ej: stywaireleases)
#      AZURE_STORAGE_SAS       → SAS token generado arriba (sin el ? inicial)
#      AZURE_STORAGE_CONTAINER → nombre del container (ej: releases)
#
# TRIGGER:
#   Se ejecuta cuando se pushea un tag que empieza con "v" (ej: v0.1.0, v1.2.3)
#
# ESTRUCTURA EN AZURE BLOB:
#   releases/
#     ywai_0.1.0/
#       ywai_0.1.0_windows_amd64.zip
#       ywai_0.1.0_linux_amd64.tar.gz
#       ywai_0.1.0_darwin_arm64.tar.gz
#       checksums.txt
#     latest → copia del último release (para self-update futuro)
#       ywai_latest_windows_amd64.zip
#       ywai_latest_linux_amd64.tar.gz
#       ywai_latest_darwin_arm64.tar.gz
#       checksums.txt
#
# SELF-UPDATE:
#   El self-update de ywai sigue apuntando a GitHub Releases (público).
#   Si en el futuro querés que apunte a Azure Blob, cambiar selfupdate.go:
#     downloadURL = fmt.Sprintf("https://%s.blob.core.windows.net/%s/latest/%s", account, container, asset)
#
# =============================================================================

