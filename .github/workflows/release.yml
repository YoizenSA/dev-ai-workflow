name: Release

# ONLY tags. Single pipeline for publish: test gate + GoReleaser.
# Does not run CI workflow (CI is PR-only).
on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: ywai

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: ywai/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ywai
          args: --timeout=5m

      - name: Test unit
        run: go test ./internal/... -count=1 -timeout 60s

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ywai/internal/control/web/package-lock.json

      # bun is required by prepare-embedded.sh to bundle the background-agents
      # plugin. Without it the embedded plugins dir is empty and every release
      # ships without the plugin. See scripts/prepare-embedded.sh.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build control UI (React SPA)
        working-directory: ywai/internal/control/web
        run: |
          npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=10000 || \
          npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=10000
          npm run build

      - name: Prepare embedded data
        run: bash scripts/prepare-embedded.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: ywai
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
