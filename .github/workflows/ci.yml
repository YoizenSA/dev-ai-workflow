name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ywai

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.26']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Vet
        run: go vet ./...

      - name: Test unit
        run: go test ./internal/... -count=1 -timeout 60s

      - name: Test e2e
        run: go test ./e2e/ -v -count=1 -timeout 120s

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Prepare embedded data
        run: bash scripts/prepare-embedded.sh

      - name: Build with embedded data
        run: go build -tags embedded -ldflags "-s -w -X main.version=dev-$(git rev-parse --short HEAD)" -o ywai ./cmd/ywai/

      - name: Verify binary works
        run: ./ywai --version && ./ywai skills
