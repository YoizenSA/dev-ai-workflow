name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ywai

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.26']
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: ywai/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ywai
          args: --timeout=5m

      - name: Test unit
        run: go test ./internal/... -count=1 -timeout 60s -coverprofile=coverage.out -covermode=atomic

      - name: Test e2e
        run: go test ./e2e/ -v -count=1 -timeout 120s

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ywai/coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: ywai/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ywai/internal/control/web/package-lock.json

      - name: Build control UI (React SPA)
        working-directory: ywai/internal/control/web
        run: |
          npm ci
          npm run build

      - name: Prepare embedded data
        run: bash scripts/prepare-embedded.sh

      - name: Build with embedded data
        run: go build -tags embedded -ldflags "-s -w -X main.version=dev-$(git rev-parse --short HEAD)" -o ywai ./cmd/ywai/

      - name: Verify binary works
        run: ./ywai --version && ./ywai skills
