name: CI

# ONLY pull requests. Push to main and tags do NOT run CI.
# Tags → Release workflow only (one pipeline for publish).
on:
  pull_request:
    branches:
      - main

# Drop superseded PR runs so the queue stays short.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ywai

jobs:
  # ── Fast quality gate (Linux only) ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ywai/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Must be built with Go >= go.mod's toolchain (1.26); older
          # golangci-lint fails with "language version ... lower than targeted".
          version: v2.12.2
          working-directory: ywai
          args: --timeout=3m
          # Reuse module cache from setup-go; skip full rebuild of linter when possible.
          install-mode: binary

  # ── Unit tests across platforms (no lint — already covered above) ──────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.26"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: ywai/go.sum

      # Coverage only on Linux — no need to triple artifact / cover work.
      - name: Test unit
        if: matrix.os != 'ubuntu-latest'
        run: go test ./internal/... -count=1 -timeout 90s

      - name: Test unit (coverage)
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/... -count=1 -timeout 90s -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: ywai/coverage.out

  # ── E2E once on Linux (was run on every OS before) ─────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ywai/go.sum

      - name: Test e2e
        run: go test ./e2e/ -v -count=1 -timeout 120s

  # ── Embedded binary build (parallel to nothing; waits gates) ───────────
  # Does not wait for macos/windows — Linux unit + lint + e2e are enough to
  # prove the binary builds. Cross-OS unit still reports as separate checks.
  build:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    # Only require the Linux matrix cell for the build gate when using matrix
    # outputs is awkward; we need all test matrix cells via needs: test.
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: ywai/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ywai/internal/control/web/package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build control UI (React SPA)
        working-directory: ywai/internal/control/web
        run: |
          npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=10000 || \
          npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=10000
          npm run build

      - name: Prepare embedded data
        run: bash scripts/prepare-embedded.sh

      - name: Build with embedded data
        run: go build -tags embedded -ldflags "-s -w -X main.version=dev-$(git rev-parse --short HEAD)" -o ywai ./cmd/ywai/

      - name: Verify binary works
        run: ./ywai --version && ./ywai skills
